name: cbhi_facility_desktop
description: "Maya City CBHI — Health Facility Staff Desktop Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  file_picker: ^10.1.9
  mobile_scanner: ^6.0.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_in_app_messaging: ^0.9.2
  firebase_analytics: ^12.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
