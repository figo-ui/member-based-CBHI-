# FIX MJ-2: CI/CD pipeline — test, build, and deploy on every push to main
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.24.0'

jobs:
  # ── Backend tests ────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cbhi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Run backend tests
        run: npm test -- --coverage --forceExit
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: test
          DB_PASSWORD: test
          DB_NAME: cbhi_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          AUTH_JWT_SECRET: test-secret-for-ci-only
          DIGITAL_CARD_SECRET: test-card-secret-ci
          TYPEORM_SYNCHRONIZE: 'true'

      - name: Build backend
        run: npm run build
        working-directory: backend

  # ── Flutter member app ───────────────────────────────────────────────────────
  test-flutter-member:
    name: Flutter Member App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: member_based_cbhi

      - name: Generate code (json_serializable / freezed)
        run: flutter pub run build_runner build --delete-conflicting-outputs
        working-directory: member_based_cbhi

      - name: Analyze Flutter code
        run: flutter analyze
        working-directory: member_based_cbhi

      - name: Run Flutter tests
        run: flutter test --coverage
        working-directory: member_based_cbhi

      - name: Build Flutter APK (debug)
        run: flutter build apk --debug
        working-directory: member_based_cbhi

  # ── Flutter admin app ────────────────────────────────────────────────────────
  test-flutter-admin:
    name: Flutter Admin App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: cbhi_admin_desktop

      - name: Analyze Flutter code
        run: flutter analyze
        working-directory: cbhi_admin_desktop

      - name: Run Flutter tests
        run: flutter test
        working-directory: cbhi_admin_desktop

  # ── Flutter facility app ─────────────────────────────────────────────────────
  test-flutter-facility:
    name: Flutter Facility App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: cbhi_facility_desktop

      - name: Analyze Flutter code
        run: flutter analyze
        working-directory: cbhi_facility_desktop

      - name: Run Flutter tests
        run: flutter test
        working-directory: cbhi_facility_desktop

  # ── Deploy to staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-backend, test-flutter-member, test-flutter-admin, test-flutter-facility]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase migrations (staging)
        run: supabase db push --db-url "${{ secrets.STAGING_DATABASE_URL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cbhi-backend:staging ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/cbhi-backend:staging

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/cbhi
            docker compose pull backend
            docker compose up -d --no-deps backend
            sleep 5
            curl -f http://localhost:3000/api/health || exit 1

  # ── Deploy to production ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-backend, test-flutter-member, test-flutter-admin, test-flutter-facility]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase migrations (production)
        run: supabase db push --db-url "${{ secrets.PROD_DATABASE_URL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cbhi-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/cbhi-backend:latest

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/cbhi
            docker compose pull backend
            docker compose up -d --no-deps backend
            sleep 10
            curl -f https://${{ secrets.DOMAIN }}/api/health || exit 1
