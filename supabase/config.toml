# Supabase project configuration for Maya City CBHI
# https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# We use our own JWT auth — Supabase Auth is disabled
# The NestJS backend handles all authentication
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 86400
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = false
enable_confirmations = false

[auth.sms]
enable_signup = false

[realtime]
enabled = true
ip_version = "IPv4"

[analytics]
enabled = false
