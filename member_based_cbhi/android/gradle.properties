# JVM heap — balanced for Windows with limited RAM
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Dfile.encoding=UTF-8

# Single worker to avoid daemon contention
org.gradle.parallel=false
org.gradle.workers.max=2

# Disable daemon to avoid "4 busy daemons" crash on Windows
org.gradle.daemon=false

# Use in-process Kotlin compiler — avoids daemon connection failures
kotlin.compiler.execution.strategy=in-process
kotlin.incremental=false

# Task caching
org.gradle.caching=false
org.gradle.configuration-cache=false

# Android
android.useAndroidX=true
android.enableJetifier=false
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=true
android.nonFinalResIds=false
