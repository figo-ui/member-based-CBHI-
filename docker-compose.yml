version: '3.9'

# ── Usage ──────────────────────────────────────────────────────────────────────
#
# Local development (local Postgres + Redis):
#   docker compose up -d
#
# Production with Supabase (no local Postgres):
#   docker compose --profile supabase up -d
#
# The backend reads DB connection from backend/.env.
# When using Supabase, set DB_HOST/DB_PORT/DB_USERNAME/DB_PASSWORD/DB_NAME/DB_SSL
# in backend/.env and use the --profile supabase flag to skip local postgres.
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL (local dev only — skip with --profile supabase) ──────────────
  postgres:
    profiles: ["local"]
    image: postgres:16-alpine
    container_name: cbhi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cbhi_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + Bull job queue) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbhi_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-cbhi_redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cbhi_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (Supabase mode — no local postgres dependency) ──────────────
  backend:
    profiles: ["supabase"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cbhi_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cbhi_redis_pass}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Backend API (local mode — depends on local postgres) ────────────────────
  backend-local:
    profiles: ["local"]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cbhi_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cbhi_redis_pass}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── nginx reverse proxy with TLS termination ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cbhi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}

  # ── Certbot (Let's Encrypt TLS certificates) ────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: cbhi_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

  # ── Automated PostgreSQL backups (local mode only) ──────────────────────────
  pg-backup:
    profiles: ["local"]
    image: prodrigestivill/postgres-backup-local:16
    container_name: cbhi_pg_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME:-cbhi_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_www:
  certbot_conf:
